<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nubeware · Dashboard de Contratos</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Estilos -->
    <link rel="stylesheet" href="css/config.css">
    <link rel="stylesheet" href="css/contrato-detalle.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>

<body>

    <!-- TOP NAVIGATION HEADER -->
    <header class="enterprise-header">
        <div class="enterprise-header-content">
            <div class="enterprise-brand-section">
                <div class="enterprise-logo">
                    <i>📄</i>
                </div>
                <h1 class="enterprise-contract-title">ContraLog</h1>
            </div>

            <nav class="enterprise-nav">
                <a href="#home" class="nav-link active" data-section="home">Resumen</a>
                <a href="#clientes" class="nav-link" data-section="clientes">Clientes</a>
                <a href="#contratos" class="nav-link" data-section="contratos">Contratos</a>
                <a href="#usuarios" class="nav-link hide-colaborador" data-section="usuarios">Usuarios</a>
                <a href="#auditoria" class="nav-link hide-colaborador" data-section="auditoria">Auditoría</a>
            </nav>

            <div class="enterprise-user-actions">
                <div class="notification-container">
                    <button class="notification-btn" id="bellBtn">
                        <i>🔔</i>
                        <span class="badge" id="notifBadge" style="display: none;">0</span>
                    </button>
                    <div class="notification-menu" id="notifMenu">
                        <div class="notification-header">
                            <span>Alertas de Vencimiento</span>
                            <i>ℹ️</i>
                        </div>
                        <div class="notification-list" id="notifList">
                            <div class="notification-empty">Cargando alertas...</div>
                        </div>
                    </div>
                </div>

                <div class="user-profile-mini">
                    <div class="user-info">
                        <span class="user-name" id="userName">Cargando...</span>
                        <span class="user-role" id="userRole">Rol</span>
                    </div>
                    <button class="btn-logout" id="logoutBtn">
                        <i>🚪</i>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="enterprise-content">
        <div id="content-container" class="animate-fade">
            <!-- Content will be injected here by dashboard-new.js -->
            <div class="enterprise-loader">
                <div class="enterprise-spinner"></div>
                <p style="margin-top: 1rem; color: var(--nubeware-gray-600);">Iniciando panel de control...</p>
            </div>
        </div>
    </main>

    <!-- Modals Container -->
    <div id="modal-container" class="modal-overlay hidden">
        <div class="modal-content animate-fade">
            <div class="modal-header">
                <h3 id="modalTitle">Título del Modal</h3>
                <button class="close-modal" id="closeModalBtn">
                    <i>✕</i>
                </button>
            </div>
            <div id="modalBody" class="modal-body">
                <!-- Modal content goes here -->
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/dashboard.js"></script>
</body>

</html>
