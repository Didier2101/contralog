<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nubeware · Detalle del Cliente</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Custom Notifications -->
    <script src="js/notifications.js"></script>

    <!-- Estilos -->
    <link rel="stylesheet" href="css/config.css">
    <link rel="stylesheet" href="css/contrato-detalle.css">
    <link rel="stylesheet" href="css/cliente-detalle.css">
</head>

<body>

    <!-- Header Banner Placeholder (Injected by JS) -->
    <div id="header-banner-target"></div>

    <!-- CONTENIDO PRINCIPAL -->
    <div class="enterprise-content">
        <div id="content-container">
            <!-- Loader -->
            <div class="enterprise-loader">
                <div class="enterprise-spinner"></div>
                <p style="margin-top: 1rem; color: var(--nubeware-gray-600);">Cargando información del cliente...</p>
            </div>
        </div>

        <!-- Back Action -->
        <div style="margin-top: 4rem; text-align: center; padding-top: 2rem; border-top: var(--border-nubeware);">
            <button onclick="window.history.back()" class="enterprise-attach-button"
                style="background: white; color: var(--nubeware-primary); border: 1px solid var(--nubeware-primary);">
                ← VOLVER AL PANEL
            </button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/cliente-detalle.js"></script>

</body>

</html>
