<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Usuario | ContraLog</title>
    <!-- Same head content -->
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📄</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .form-container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .page-header {
            margin-bottom: 2rem;
        }

        .page-header h2 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .page-header p {
            color: var(--text-muted);
        }
    </style>
</head>

<body class="dashboard-body">
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-box-sidebar"><i data-lucide="file-text" color="white"></i></div>
            <span class="logo-text">ContraLog</span>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-section">Menú Principal</div>
            <a href="dashboard.html" class="nav-link"><i data-lucide="arrow-left"></i><span>Volver al
                    Dashboard</span></a>
            <div class="nav-section">Admin</div>
            <a href="#" class="nav-link active"><i data-lucide="user-plus"></i><span>Crear Usuario</span></a>
        </nav>
        <div class="sidebar-footer">
            <div class="user-profile">
                <div class="user-avatar" id="userInitial">U</div>
                <div class="user-info"><span class="user-name" id="userName">...</span><span class="user-role"
                        id="userRole">...</span></div>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <div class="form-container animate-fade">
            <div class="page-header">
                <h2>Nuevo Usuario</h2>
                <p>Registra un nuevo usuario con acceso al sistema.</p>
            </div>

            <form id="createUsuarioForm">
                <div class="form-grid" style="grid-template-columns: 1fr;">
                    <div class="form-group">
                        <label>Nombre Completo</label>
                        <input type="text" id="u_nombre" class="form-control" placeholder="Juan Pérez" required
                            minlength="3">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="u_email" class="form-control" placeholder="juan@empresa.com" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="u_password" class="form-control" placeholder="••••••••" required
                            minlength="6">
                    </div>
                    <div class="form-group">
                        <label>Rol</label>
                        <select id="u_rol" class="form-control" required>
                            <option value="colaborador">Colaborador</option>
                            <option value="admin">Administrador</option>
                        </select>
                    </div>
                </div>

                <div class="modal-footer" style="padding: 0; border: none; margin-top: 2rem; background: transparent;">
                    <button type="button" class="btn btn-ghost"
                        onclick="window.location.href='dashboard.html#usuarios'">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Registrar Usuario</button>
                </div>
            </form>
        </div>
    </main>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const userStr = localStorage.getItem('user');
            if (!userStr) { window.location.href = 'login.html'; return; }
            const user = JSON.parse(userStr);
            document.getElementById('userName').textContent = user.nombre;
            document.getElementById('userRole').textContent = user.rol;
            document.getElementById('userInitial').textContent = user.nombre.charAt(0).toUpperCase();
            lucide.createIcons();

            document.getElementById('createUsuarioForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const userData = {
                    nombre: document.getElementById('u_nombre').value,
                    email: document.getElementById('u_email').value,
                    password: document.getElementById('u_password').value,
                    rol: document.getElementById('u_rol').value
                };

                try {
                    await apiClient.post('/usuarios/crear', userData);
                    Swal.fire({
                        icon: 'success',
                        title: 'Usuario Creado',
                        text: 'Registrado correctamente.',
                        showConfirmButton: false,
                        timer: 1500
                    }).then(() => window.location.href = 'dashboard.html#usuarios');
                } catch (error) {
                    Swal.fire('Error', error.message, 'error');
                }
            });
        });
    </script>
</body>

</html>
