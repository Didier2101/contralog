<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cliente | ContraLog</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📄</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .form-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .page-header {
            margin-bottom: 2rem;
        }

        .page-header h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }

        .page-header p {
            color: var(--text-muted);
        }
    </style>
</head>

<body class="dashboard-body">
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-box-sidebar">
                <i data-lucide="file-text" size="20" color="white"></i>
            </div>
            <span class="logo-text">ContraLog</span>
        </div>

        <nav class="sidebar-nav">
            <div class="nav-section">Menú Principal</div>
            <a href="dashboard.html" class="nav-link">
                <i data-lucide="arrow-left"></i>
                <span>Volver al Dashboard</span>
            </a>
            <div class="nav-section">Acciones</div>
            <a href="#" class="nav-link active">
                <i data-lucide="user-plus"></i>
                <span>Crear Cliente</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="user-profile">
                <div class="user-avatar" id="userInitial">U</div>
                <div class="user-info">
                    <span class="user-name" id="userName">Cargando...</span>
                    <span class="user-role" id="userRole">Rol</span>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <div class="form-container animate-fade">
            <div class="page-header">
                <h2>Nuevo Cliente</h2>
                <p>Complete la información para registrar un nuevo cliente en el sistema.</p>
            </div>

            <form id="createClienteForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Tipo Persona</label>
                        <select id="tipo_persona" class="form-control" required>
                            <option value="natural">Natural</option>
                            <option value="juridica">Jurídica</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Tipo Identificación</label>
                        <select id="tipo_identificacion" class="form-control" required>
                            <option value="cc">Cédula de Ciudadanía</option>
                            <option value="ce">Cédula de Extranjería</option>
                            <option value="pasaporte">Pasaporte</option>
                            <option value="nit">NIT</option>
                            <option value="pep">PEP</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Identificación</label>
                        <input type="text" id="identificacion" class="form-control" placeholder="Ej: 12345678" required>
                    </div>
                    <div class="form-group">
                        <label>Nombre o Razón Social</label>
                        <input type="text" id="nombre_o_razon_social" class="form-control"
                            placeholder="Nombre completo o Razón Social" required>
                    </div>
                    <div class="form-group">
                        <label>Teléfono</label>
                        <input type="text" id="telefono" class="form-control" placeholder="Ej: 3001234567">
                    </div>
                    <div class="form-group">
                        <label>Email de Contacto</label>
                        <input type="email" id="email_contacto" class="form-control" placeholder="cliente@correo.com">
                    </div>
                </div>

                <div class="modal-footer" style="padding: 0; background: transparent; border: none; margin-top: 2rem;">
                    <button type="button" class="btn btn-ghost"
                        onclick="window.location.href='dashboard.html#clientes'">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar Cliente</button>
                </div>
            </form>
        </div>
    </main>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Check Auth
            const userStr = localStorage.getItem('user');
            if (!userStr) {
                window.location.href = 'login.html';
                return;
            }
            const user = JSON.parse(userStr);
            document.getElementById('userName').textContent = user.nombre;
            document.getElementById('userRole').textContent = user.rol;
            document.getElementById('userInitial').textContent = user.nombre.charAt(0).toUpperCase();

            // Initialize Icons
            lucide.createIcons();

            // Form Logic
            const tipoPersonaSelect = document.getElementById('tipo_persona');
            const tipoIdSelect = document.getElementById('tipo_identificacion');

            const updateIdOptions = () => {
                const tipo = tipoPersonaSelect.value;
                tipoIdSelect.innerHTML = '';

                if (tipo === 'natural') {
                    tipoIdSelect.innerHTML = `
                        <option value="cc">Cédula de Ciudadanía</option>
                        <option value="ce">Cédula de Extranjería</option>
                        <option value="pasaporte">Pasaporte</option>
                        <option value="pep">PEP</option>
                    `;
                } else {
                    tipoIdSelect.innerHTML = `
                        <option value="nit">NIT</option>
                    `;
                }
            };

            tipoPersonaSelect.addEventListener('change', updateIdOptions);
            updateIdOptions();

            document.getElementById('createClienteForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const submitBtn = e.target.querySelector('button[type="submit"]');
                const originalText = submitBtn.innerHTML;

                const formData = {
                    tipo_persona: document.getElementById('tipo_persona').value,
                    tipo_identificacion: document.getElementById('tipo_identificacion').value,
                    identificacion: document.getElementById('identificacion').value,
                    nombre_o_razon_social: document.getElementById('nombre_o_razon_social').value,
                    telefono: document.getElementById('telefono').value || null,
                    email_contacto: document.getElementById('email_contacto').value || null
                };

                try {
                    submitBtn.disabled = true;
                    submitBtn.innerHTML = '<span class="loader-sm"></span> Guardando...';

                    await apiClient.post('/clientes/crear', formData);

                    Swal.fire({
                        icon: 'success',
                        title: '¡Cliente Creado!',
                        text: 'El cliente ha sido registrado correctamente.',
                        timer: 2000,
                        showConfirmButton: false
                    }).then(() => {
                        window.location.href = 'dashboard.html#clientes';
                    });

                } catch (error) {
                    Swal.fire({
                        icon: 'error',
                        title: 'Error',
                        text: error.message || 'No se pudo crear el cliente'
                    });
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = originalText;
                }
            });
        });
    </script>
</body>

</html>
