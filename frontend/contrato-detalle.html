<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalles del Contrato | ContraLog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body {
            background-color: #f8fafc;
            display: flex;
            justify-content: center;
            padding: 2rem;
            min-height: 100vh;
        }

        .detalle-container {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
        }

        .header-actions {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 1rem;
        }
    </style>
</head>

<body>

    <div class="detalle-container animate-fade">
        <div class="header-actions">
            <button onclick="window.close()" class="btn btn-secondary"
                style="background: white; color: var(--text-main); border: 1px solid var(--border);">
                <i data-lucide="x"></i> Cerrar Vista
            </button>
        </div>

        <div id="content-container">
            <!-- Loader initially -->
            <div class="loader-container"
                style="height: 400px; background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);">
                <div class="loader"></div>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            loadContractDetails();
        });

        async function loadContractDetails() {
            const urlParams = new URLSearchParams(window.location.search);
            const codigo = urlParams.get('codigo');
            const tipo = urlParams.get('tipo');

            if (!codigo || !tipo) {
                Swal.fire('Error', 'Parámetros inválidos', 'error').then(() => window.close());
                return;
            }

            try {
                const c = await apiClient.get(`/contratos/${tipo}/${codigo}`);

                // Asegurar array de documentos
                const documentos = c.documentos || [];

                const html = `
                    <div class="glass animate-slide-up" style="padding: 0; overflow: hidden;">
                        <!-- Custom Header for the Card -->
                        <div style="background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); padding: 2rem; color: white;">
                             <div style="display: flex; justify-content: space-between; align-items: center;">
                                <div>
                                    <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 0.5rem;">
                                        <span class="badge" style="background: rgba(255,255,255,0.2); color: white; border: none;">${tipo === 'juridico' ? 'Persona Jurídica' : 'Persona Natural'}</span>
                                        <span class="badge status-${c.estado}" style="border: 1px solid rgba(255,255,255,0.3);">${c.estado}</span>
                                    </div>
                                    <h1 style="margin: 0; font-size: 1.75rem; font-weight: 700;">${c.cliente_nombre}</h1>
                                    <p style="margin: 0.5rem 0 0 0; opacity: 0.9; font-family: 'Inter', monospace; display: flex; align-items: center; gap: 0.5rem;">
                                        <i data-lucide="hash" size="14"></i> ${c.codigo_unico}
                                    </p>
                                </div>
                            </div>
                        </div>

                        <div style="padding: 2rem;">
                            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem;">
                                <!-- Column 1: Info -->
                                <div>
                                    <h3 style="margin: 0 0 1.5rem 0; color: var(--text-main); font-size: 1.1rem; border-bottom: 2px solid var(--border); padding-bottom: 0.5rem;">
                                        <i data-lucide="info" size="18" style="vertical-align: text-bottom;"></i> Información General
                                    </h3>
                                    
                                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                                        <div>
                                            <label style="display: block; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.25rem; text-transform: uppercase; font-weight: 600;">Vigencia Inicio</label>
                                            <div style="color: var(--text-main); font-weight: 500;">
                                                <i data-lucide="calendar" size="14"></i>
                                                ${new Date(c.fecha_inicio).toLocaleDateString()}
                                            </div>
                                        </div>
                                        <div>
                                            <label style="display: block; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.25rem; text-transform: uppercase; font-weight: 600;">Vigencia Fin</label>
                                            <div style="color: var(--text-main); font-weight: 500;">
                                                <i data-lucide="calendar" size="14"></i>
                                                ${new Date(c.fecha_final).toLocaleDateString()}
                                            </div>
                                        </div>

                                        ${tipo === 'natural' ? `
                                            <div>
                                                <label style="display: block; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.25rem; text-transform: uppercase; font-weight: 600;">NDA Firmado</label>
                                                <div style="color: var(--text-main); font-weight: 500;">
                                                    <i data-lucide="signature" size="14"></i>
                                                    ${c.nda_firmado ? 'SÍ' : 'NO'}
                                                </div>
                                            </div>
                                        ` : ''}

                                        <div>
                                            <label style="display: block; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.25rem; text-transform: uppercase; font-weight: 600;">Registrado por</label>
                                            <div style="color: var(--text-main); font-weight: 500;">
                                                <i data-lucide="user" size="14"></i>
                                                ${c.creador_nombre || 'Sistema'}
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <!-- Column 2: Docs -->
                                <div>
                                    <h3 style="margin: 0 0 1.5rem 0; color: var(--text-main); font-size: 1.1rem; border-bottom: 2px solid var(--border); padding-bottom: 0.5rem;">
                                        <i data-lucide="files" size="18" style="vertical-align: text-bottom;"></i> Documentos Asociados
                                    </h3>
                                    
                                    ${documentos.length > 0 ? `
                                        <div style="display: flex; flex-direction: column; gap: 0.75rem;">
                                            ${documentos.map(doc => {
                    const docUrl = doc.s3_key.startsWith('http') ? doc.s3_key : `${API_BASE_URL}/uploads/${doc.s3_key}`;
                    // Icon logic
                    let icon = 'file-text';
                    if (doc.tipo_documento.toLowerCase().includes('poliza')) icon = 'shield';

                    return `
                                                    <a href="${docUrl}" target="_blank" class="doc-card-link" style="
                                                        display: flex; 
                                                        justify-content: space-between; 
                                                        align-items: center; 
                                                        padding: 1rem; 
                                                        background: var(--bg-main); 
                                                        border: 1px solid var(--border); 
                                                        border-radius: 8px; 
                                                        text-decoration: none; 
                                                        transition: all 0.2s ease;">
                                                        
                                                        <div style="display: flex; align-items: center; gap: 1rem;">
                                                            <div style="background: rgba(99, 102, 241, 0.1); padding: 0.5rem; border-radius: 6px; color: var(--primary);">
                                                                <i data-lucide="${icon}"></i>
                                                            </div>
                                                            <div>
                                                                <div style="font-weight: 600; color: var(--text-main); font-size: 0.9rem;">${doc.tipo_documento}</div>
                                                                <div style="font-size: 0.75rem; color: var(--text-muted); font-family: monospace;">${doc.codigo_seguimiento}</div>
                                                            </div>
                                                        </div>
                                                        
                                                        <div style="color: var(--primary); display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; font-weight: 500;">
                                                            Abrir <i data-lucide="external-link" size="16"></i>
                                                        </div>
                                                    </a>
                                                    <style>
                                                        .doc-card-link:hover {
                                                            border-color: var(--primary);
                                                            transform: translateY(-2px);
                                                            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
                                                        }
                                                    </style>
                                                `;
                }).join('')}
                                        </div>
                                    ` : `
                                        <div style="text-align: center; padding: 2rem; color: var(--text-muted); border: 2px dashed var(--border); border-radius: 8px;">
                                            <i data-lucide="file-x" size="32" style="opacity: 0.5;"></i>
                                            <p style="margin-top: 0.5rem;">No hay documentos asociados</p>
                                        </div>
                                    `}
                                </div>
                            </div>
                        </div>
                    </div>
                `;

                document.getElementById('content-container').innerHTML = html;
                lucide.createIcons();
            } catch (error) {
                console.error('Error cargando contrato:', error);
                document.getElementById('content-container').innerHTML = `
                    <div style="text-align: center; padding: 3rem; color: var(--danger);">
                        <i data-lucide="alert-circle" size="48"></i>
                        <h3>Error cargando el contrato</h3>
                        <p>${error.message}</p>
                        <button onclick="window.close()" class="btn btn-secondary" style="margin-top: 1rem;">Cerrar Pestaña</button>
                    </div>
                `;
                lucide.createIcons();
            }
        }
    </script>
</body>

</html>
